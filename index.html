<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joko ‚Äî CL Revenue Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --s1: #111; --s2: #1a1a1a; --s3: #222;
      --border: #222; --muted: #555; --text2: #888; --text: #fff;
      --green: #64E76A; --purple: #9254E3; --yellow: #E4FA62;
      --red: #ff5555; --radius: 12px;
      --font: 'Instrument Sans','Inter',sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; }

    /* ‚îÄ‚îÄ Header ‚îÄ‚îÄ */
    header { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:50px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:200; }
    .logo { font-weight:700; font-size:14px; color:var(--green); }
    .logo span { color:var(--text2); font-weight:400; margin-left:6px; font-size:12px; }
    nav { display:flex; gap:3px; }
    .tab { padding:5px 14px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; color:var(--text2); border:none; background:none; transition:all .15s; }
    .tab.active, .tab:hover { background:var(--s2); color:var(--text); }
    .tab.active { color:var(--green); }
    .updated { font-size:12px; color:#fff; background:rgba(255,255,255,0.15); padding:4px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.35); font-weight:500; }

    /* ‚îÄ‚îÄ Layout ‚îÄ‚îÄ */
    main { padding:18px 24px; max-width:1700px; margin:0 auto; }
    .tab-content { display:none; flex-direction:column; gap:14px; }
    .tab-content.active { display:flex; }

    /* ‚îÄ‚îÄ KPI Bar ‚îÄ‚îÄ */
    .kpi-bar    { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .am-kpi-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
    .kpi { background:var(--s1); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
    .kpi.clickable { cursor:pointer; transition:border-color .15s, background .15s; }
    .kpi.clickable:hover { border-color:rgba(100,231,106,.4); background:var(--s2); }
    .kpi-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--text2); margin-bottom:5px; }
    .kpi-value { font-size:22px; font-weight:700; color:var(--green); line-height:1.1; }
    .kpi-sub { font-size:11px; color:var(--text2); margin-top:3px; }
    .pos { color:var(--green); } .neg { color:var(--red); } .neu { color:var(--text2); }

    /* ‚îÄ‚îÄ Cards ‚îÄ‚îÄ */
    .card { background:var(--s1); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
    .card-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--text2); margin-bottom:14px; }

    /* ‚îÄ‚îÄ Charts ‚îÄ‚îÄ */
    .chart-full canvas { width:100%!important; height:300px!important; }
    .chart-legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); }
    .legend-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
    .legend-line { width:18px; height:0; border-top:2px dashed var(--yellow); flex-shrink:0; }
    .section-header { display:flex; align-items:baseline; gap:8px; margin-bottom:12px; }
    .section-title { font-size:13px; font-weight:600; }
    .section-sub { font-size:11px; color:var(--text2); }
    .q-chart-wrap { margin-bottom:16px; }
    .q-chart-wrap canvas { height:180px!important; width:100%!important; }

    /* ‚îÄ‚îÄ Transposed performance table ‚îÄ‚îÄ */
    .section-sep { height:1px; background:var(--border); margin:18px 0 16px; }
    .perf-table { width:100%; border-collapse:collapse; font-size:11px; table-layout:auto; }
    .perf-table thead th { padding:6px 8px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; color:var(--text2); border-bottom:1px solid var(--border); text-align:right; white-space:nowrap; }
    .perf-table thead th.row-label { text-align:left; min-width:90px; position:sticky; left:0; background:var(--s1); z-index:2; }
    .perf-table tbody td { padding:9px 8px; text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; border-bottom:1px solid #161616; }
    .perf-table tbody td.row-label { text-align:left; font-weight:600; font-size:11px; white-space:nowrap; position:sticky; left:0; background:var(--s1); z-index:2; padding-right:14px; }
    .perf-table tbody tr:last-child td { border-top:1px solid var(--border); border-bottom:none; font-weight:700; }

    /* ‚îÄ‚îÄ Merchant Table ‚îÄ‚îÄ */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    thead th { text-align:left; padding:7px 10px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); border-bottom:1px solid var(--border); white-space:nowrap; }
    thead th.num { text-align:right; }
    thead th.sortable { cursor:pointer; user-select:none; transition:color .1s; }
    thead th.sortable:hover { color:var(--text); }
    thead th.sort-asc::after  { content:' ‚Üë'; color:var(--green); }
    thead th.sort-desc::after { content:' ‚Üì'; color:var(--green); }
    tbody tr { border-bottom:1px solid #161616; cursor:pointer; transition:background .1s; }
    tbody tr:hover { background:var(--s2); }
    tbody td { padding:8px 10px; vertical-align:middle; }
    tbody td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .badge-new { display:inline-block; font-size:9px; font-weight:700; background:rgba(100,231,106,.12); color:var(--green); border:1px solid rgba(100,231,106,.25); border-radius:3px; padding:1px 4px; margin-left:5px; text-transform:uppercase; vertical-align:middle; }
    .am-pill { display:inline-block; font-size:10px; background:var(--s2); border-radius:5px; padding:2px 7px; color:var(--text2); border:1px solid var(--border); }
    .merchant-name { font-weight:500; }
    .dim { color:var(--muted); font-size:11px; }
    .yoy-pos { color:var(--green); font-weight:500; } .yoy-neg { color:var(--red); font-weight:500; }

    /* ‚îÄ‚îÄ Budget Gauge ‚îÄ‚îÄ */
    .gauge-wrap { display:flex; align-items:center; gap:6px; justify-content:flex-end; }
    .gauge-bar { width:54px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; flex-shrink:0; }
    .gauge-fill { height:100%; border-radius:2px; }
    .gauge-pct { font-size:11px; min-width:28px; text-align:right; font-variant-numeric:tabular-nums; }

    /* ‚îÄ‚îÄ Type badge ‚îÄ‚îÄ */
    .type-capped   { font-size:10px; font-weight:600; color:var(--purple); background:rgba(146,84,227,.12); border:1px solid rgba(146,84,227,.3); border-radius:4px; padding:2px 6px; white-space:nowrap; }
    .type-uncapped { font-size:10px; font-weight:600; color:var(--yellow); background:rgba(228,250,98,.08); border:1px solid rgba(228,250,98,.25); border-radius:4px; padding:2px 6px; white-space:nowrap; }

    /* ‚îÄ‚îÄ AM View ‚îÄ‚îÄ */
    .am-filter { display:flex; gap:8px; margin-bottom:14px; }
    .am-btn { padding:6px 16px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--s2); color:var(--text2); transition:all .15s; }
    .am-btn.active { background:var(--green); color:#000; border-color:var(--green); }

    /* ‚îÄ‚îÄ Modal ‚îÄ‚îÄ */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:500; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--s1); border:1px solid var(--border); border-radius:16px; width:min(900px,96vw); max-height:90vh; overflow-y:auto; padding:24px; position:relative; }
    .modal-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; }
    .modal-title { font-size:20px; font-weight:700; }
    .modal-sub { font-size:12px; color:var(--text2); margin-top:3px; display:flex; align-items:center; gap:6px; }
    .modal-close { background:var(--s2); border:1px solid var(--border); color:var(--text2); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .modal-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:18px; }
    .modal-kpi { background:var(--s2); border-radius:9px; padding:11px 13px; border:1px solid var(--border); }
    .modal-kpi-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); margin-bottom:3px; }
    .modal-kpi-value { font-size:18px; font-weight:700; }
    .modal-kpi-sub { font-size:11px; color:var(--text2); margin-top:1px; }
    .modal-chart-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--text2); margin-bottom:10px; }
    .modal-chart-legend { display:flex; gap:12px; margin-bottom:8px; }
    .modal-chart-wrap canvas { height:200px!important; width:100%!important; }
    .modal-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:16px; }
    .modal-table th { text-align:right; padding:6px 10px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; color:var(--text2); border-bottom:1px solid var(--border); }
    .modal-table th:first-child { text-align:left; }
    .modal-table td { padding:7px 10px; text-align:right; border-bottom:1px solid #161616; font-variant-numeric:tabular-nums; }
    .modal-table td:first-child { text-align:left; font-weight:500; }
    .modal-table .act26 { color:var(--green); font-weight:600; }
    .modal-table .proj26 { color:rgba(100,231,106,.5); }
    .modal-table .past { color:var(--muted); }
    .modal-note { font-size:11px; color:var(--muted); margin-top:12px; }
  </style>
</head>
<body>
<header>
  <div class="logo">Joko <span>CL Revenue Dashboard</span></div>
  <nav>
    <button class="tab active" onclick="switchTab('management',this)">Management</button>
    <button class="tab" onclick="switchTab('am',this)">AM View</button>
    <button class="tab" onclick="switchTab('merchants',this)">Merchants</button>
  </nav>
  <div class="updated" id="updated-at">‚Äî</div>
</header>

<main>
  <!-- ‚ïê‚ïê‚ïê MANAGEMENT ‚ïê‚ïê‚ïê -->
  <div id="tab-management" class="tab-content active">
    <div class="kpi-bar" id="kpi-bar"></div>

    <div class="card chart-full">
      <div class="section-header">
        <span class="section-title">Monthly Card-Linked Revenue</span>
        <span class="section-sub">2024 ¬∑ 2025 ¬∑ 2026 actual + projection vs OKR</span>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(90,90,90,.8)"></div>2024</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(180,180,180,.6)"></div>2025</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(100,231,106,.92)"></div>2026 Actual</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(100,231,106,.22);border:1px solid rgba(100,231,106,.4)"></div>2026 Proj.</div>
        <div class="legend-item"><div class="legend-line"></div>Monthly OKR</div>
      </div>
      <canvas id="main-chart"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Monthly Performance vs OKR</div>
      <div class="table-wrap" id="monthly-table-wrap"></div>
    </div>

    <div class="card">
      <div class="card-title">Quarterly Performance</div>
      <div class="q-chart-wrap"><canvas id="q-chart"></canvas></div>
      <div class="section-sep"></div>
      <div class="table-wrap" id="q-table-wrap"></div>
    </div>
  </div>

  <!-- ‚ïê‚ïê‚ïê AM VIEW ‚ïê‚ïê‚ïê -->
  <div id="tab-am" class="tab-content">
    <div class="am-filter">
      <button class="am-btn active" onclick="filterAM('all',this)">All</button>
      <button class="am-btn" onclick="filterAM('Eva',this)">Eva</button>
      <button class="am-btn" onclick="filterAM('Elo√Øse',this)">Elo√Øse</button>
      <button class="am-btn" onclick="filterAM('Rapha√´lle',this)">Rapha√´lle</button>
    </div>
    <div class="am-kpi-bar" id="am-kpi-bar"></div>
    <div class="card">
      <div class="table-wrap" id="am-table-wrap"></div>
    </div>
  </div>

  <!-- ‚ïê‚ïê‚ïê MERCHANTS ‚ïê‚ïê‚ïê -->
  <div id="tab-merchants" class="tab-content">
    <div class="card">
      <div class="section-header">
        <span class="section-title">All Merchants</span>
        <span class="section-sub" id="merchants-count">‚Äî</span>
      </div>
      <div class="table-wrap" id="merchants-table-wrap"></div>
    </div>
  </div>
</main>

<!-- ‚ïê‚ïê‚ïê MERCHANT MODAL ‚ïê‚ïê‚ïê -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">‚Äî</div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">‚úï</button>
    </div>
    <div class="modal-kpis" id="modal-kpis"></div>
    <div class="modal-chart-title">Monthly Revenue 2025 ¬∑ 2026</div>
    <div class="modal-chart-legend" id="modal-chart-legend"></div>
    <div class="modal-chart-wrap"><canvas id="modal-chart"></canvas></div>
    <table class="modal-table" id="modal-table"></table>
    <div class="modal-note" id="modal-note"></div>
  </div>
</div>

<!-- ‚ïê‚ïê‚ïê NEW CLIENTS MODAL ‚ïê‚ïê‚ïê -->
<div class="modal-overlay" id="nc-modal-overlay" onclick="if(event.target===this)closeNewClientsModal()">
  <div class="modal" style="width:min(640px,96vw)">
    <div class="modal-header">
      <div>
        <div class="modal-title">New Clients 2026</div>
        <div class="modal-sub" id="nc-modal-sub">Revenue breakdown</div>
      </div>
      <button class="modal-close" onclick="closeNewClientsModal()">‚úï</button>
    </div>
    <div id="nc-modal-body"></div>
  </div>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let GDATA    = null;
let activeAM = 'all';
let modalChart = null;
let sortCol  = 'signed';
let sortDir  = -1;

/* ‚îÄ‚îÄ Merchant display names ‚îÄ‚îÄ */
const MERCHANT_LABELS = {
  'leroy-merlin':'Leroy Merlin','uber-eats':'Uber Eats','uber':'Uber',
  'carrefour':'Carrefour','hellofresh':'HelloFresh','kiabi':'Kiabi',
  'castorama':'Castorama','vente-privee':'Vente-Priv√©e','boulanger':'Boulanger',
  'sephora':'Sephora','nocibe':'Nocib√©','etam':'Etam','kfc':'KFC',
  'maisons-du-monde':'Maisons du Monde','adopt':'Adopt','showroomprive':'Showroompriv√©',
  'chaussea':'Chaussea','bricomarche':'Bricomarch√©','monoprix':'Monoprix',
  'vertbaudet':'Vertbaudet','the-bradery':'The Bradery','b-and-m':'B&M',
  'but':'But','blablacar':'BlaBlaCar','alinea':'Alin√©a','printemps':'Printemps',
  'ultra-premium-direct':'Ultra Premium Direct','chronodrive':'Chronodrive',
  'galeries-lafayette':'Galeries Lafayette','subway':'Subway','decathlon':'Decathlon',
  'brico-depot':'Brico D√©p√¥t','certideal':'Certideal','jules':'Jules',
  'pokawa':'Pokawa','nespresso':'Nespresso','leon-de-bruxelles':'L√©on de Bruxelles',
  'celio':'Celio','dominos-pizza':"Domino's Pizza",'beauteprivee':'Beaut√© Priv√©e',
  'hema':'Hema','rougegorge':'RougeGorge','zoomalia':'Zoomalia','damart':'Damart',
  'heetch':'Heetch','krys':'Krys','horace':'Horace','beauty-success':'Beauty Success',
  'gaumont-pathe':'Gaumont Path√©','hippopotamus':'Hippopotamus','kiko':'Kiko',
  'zadig-et-voltaire':'Zadig & Voltaire','instant-gaming':'Instant Gaming',
  'flunch':'Flunch','allopneus':'Allopneus','quitoque':'Quitoque','lalalab':'Lalalab',
  'stych':'Stych','privatesportshop':'Private Sport Shop','aroma-zone':'Aroma-Zone',
  'ulysse':'Ulysse','prismashop':'Prismashop','le-closet':'Le Closet',
  'gambettes-box':'Gambettes Box','les-raffineurs':'Les Raffineurs','promod':'Promod',
  'feed':'Feed.','natura-force':'Natura Force','gemo':'G√©mo',
  'jules-et-jenn':'Jules & Jenn','darjeeling':'Darjeeling','bizzbee':'Bizzbee',
};
function merchantLabel(id) {
  return MERCHANT_LABELS[id] || id.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}

/* ‚îÄ‚îÄ Number helpers ‚îÄ‚îÄ */
function fmt(n, d=0) {
  if (n==null||isNaN(n)) return '‚Äî';
  if (Math.abs(n)>=1e6) return '‚Ç¨'+(n/1e6).toFixed(d||2)+'M';
  if (Math.abs(n)>=1e3) return '‚Ç¨'+Math.round(n/1e3)+'K';
  return '‚Ç¨'+Math.round(n);
}
function pct(v,b) { return b ? Math.round((v-b)/b*100) : null; }
function pctStr(v,b) {
  const p = pct(v,b);
  if (p==null) return '<span class="neu">‚Äî</span>';
  return p>=0 ? `<span class="yoy-pos">+${p}%</span>` : `<span class="yoy-neg">${p}%</span>`;
}

/* ‚îÄ‚îÄ Signed 2026 ‚îÄ‚îÄ */
function signed26(m) {
  if (m.signed_26 != null) return m.signed_26;
  if (m.remaining_budget != null) return (m.actual_26||0) + m.remaining_budget;
  return (m.actual_26||0) + (m.proj_26||0);
}
/* ‚îÄ‚îÄ Budget consumed % (actual / signed contract) ‚îÄ‚îÄ */
function budgetPct(m) {
  if (m.signed_26 == null && m.remaining_budget == null) return null;
  const s = signed26(m);
  if (s <= 0) return null;
  const p = Math.round((m.actual_26||0) / s * 100);
  return p > 110 ? null : p;
}
/* ‚îÄ‚îÄ Actual vs currently-open budget : actual / (actual + remaining) ‚îÄ‚îÄ */
function actualVsOpenBudget(m) {
  if (m.remaining_budget == null) return null;
  const opened = (m.actual_26||0) + m.remaining_budget;
  if (opened <= 0) return null;
  return Math.round((m.actual_26||0) / opened * 100);
}
function budgetGauge(p, color) {
  if (p == null) return '<span class="neu">‚Äî</span>';
  const c = color || (p>=80 ? 'var(--red)' : p>=50 ? 'var(--yellow)' : 'var(--green)');
  return `<div class="gauge-wrap">
    <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(p,100)}%;background:${c}"></div></div>
    <span class="gauge-pct" style="color:${c}">${p}%</span>
  </div>`;
}

/* ‚îÄ‚îÄ vs OKR color cell ‚îÄ‚îÄ */
function vsOkrCell(total, okr) {
  if (!okr || !total) return `<td style="text-align:right;color:var(--muted)">‚Äî</td>`;
  const v = Math.round(total / okr * 100);
  const c = v>=90?'var(--green)':v>=70?'var(--yellow)':'var(--red)';
  return `<td style="text-align:right;color:${c};font-weight:700">${v}%</td>`;
}

/* ‚îÄ‚îÄ Chart helpers ‚îÄ‚îÄ */
function ttip() {
  return { backgroundColor:'#1a1a1a', borderColor:'#333', borderWidth:1,
    titleColor:'#fff', bodyColor:'#999', padding:10,
    callbacks:{ label: c=>' '+c.dataset.label+': '+fmt(c.parsed.y) }};
}
function scalesXY(stacked=false) {
  return {
    x: { stacked, grid:{color:'transparent'}, ticks:{color:'#555',font:{size:10}} },
    y: { stacked:false, grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{size:10},
      callback:v=>Math.abs(v)>=1e6?'‚Ç¨'+(v/1e6).toFixed(1)+'M':'‚Ç¨'+Math.round(v/1e3)+'K' }}
  };
}

/* ‚îÄ‚îÄ Tab switching ‚îÄ‚îÄ */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

/* ‚îÄ‚îÄ Main render ‚îÄ‚îÄ */
function renderAll(data) {
  GDATA = data;
  document.getElementById('updated-at').textContent = 'Updated: '+data.updated_at;
  renderKPIs(data.summary);
  renderMainChart(data.chart_arrays);
  renderMonthlyTable(data.chart_arrays, data.summary.ytd_months);
  renderQSection(data.quarterly, data.chart_arrays.R25);
  renderMerchantTable('merchants-table-wrap', data.merchants);
  document.getElementById('merchants-count').textContent = `${Object.keys(data.merchants).length} merchants`;
  renderAMView(data.merchants, data.summary);
}

/* ‚îÄ‚îÄ KPI Bar (3 cards, no month range in label) ‚îÄ‚îÄ */

/* ‚îÄ‚îÄ Sort state ‚îÄ‚îÄ */
function sortBy(col) {
  if (sortCol===col) sortDir = -sortDir;
  else { sortCol=col; sortDir = (col==='name'||col==='am') ? 1 : -1; }
  document.querySelectorAll('thead th.sortable').forEach(t=>{
    t.classList.remove('sort-asc','sort-desc');
    if (t.dataset.col===col) t.classList.add(sortDir>0?'sort-asc':'sort-desc');
  });
  renderMerchantTable('merchants-table-wrap', GDATA.merchants);
  renderAMTable('am-table-wrap', GDATA.merchants, activeAM);
}

/* ‚îÄ‚îÄ Merchant rows (sorted) ‚îÄ‚îÄ */
function merchantRows(merchants, amFilter) {
  return Object.entries(merchants)
    .map(([id,m])=>({ id, ...m, signed: signed26(m), bpct: budgetPct(m) }))
    .filter(r=> amFilter==='all' || r.am===amFilter)
    .sort((a,b) => {
      let av, bv;
      if (sortCol==='name') return sortDir * merchantLabel(a.id).localeCompare(merchantLabel(b.id));
      if (sortCol==='am')   return sortDir * (a.am||'').localeCompare(b.am||'');
      switch(sortCol) {
        case 'fy25':   av=a.actual_25||0;          bv=b.actual_25||0; break;
        case 'signed': av=a.signed||0;             bv=b.signed||0;    break;
        case 'yoy':    av=a.actual_25>0?pct(a.signed,a.actual_25):null;
                       bv=b.actual_25>0?pct(b.signed,b.actual_25):null;
                       av=av??-999; bv=bv??-999; break;
        case 'ytd':    av=a.actual_26||0;          bv=b.actual_26||0; break;
        case 'open':   av=a.remaining_budget??-1;  bv=b.remaining_budget??-1; break;
        case 'avb':    av=actualVsOpenBudget(a)??-1; bv=actualVsOpenBudget(b)??-1; break;
        case 'mf_ytd': av=a.media_fees_ytd||0;    bv=b.media_fees_ytd||0; break;
        case 'mf_ly':  av=a.media_fees_ly||0;     bv=b.media_fees_ly||0; break;
        default:       av=a.signed||0;             bv=b.signed||0;
      }
      return sortDir * (av-bv);
    });
}

  const ytdM = GDATA.summary.ytd_months;
  const hasRealMonthly = m.monthly_26 && m.monthly_26.some(v => v > 0);
  let m26_display, m25_display, isEstimated;
  if (hasRealMonthly) {
    m26_display = m.monthly_26;
    m25_display = m.monthly_25 || Array(12).fill(0);
    isEstimated = false;
  } else {
    const R26A_w = GDATA.chart_arrays.R26A;
    const R26P_w = GDATA.chart_arrays.R26P;
    const R25_w  = GDATA.chart_arrays.R25;
    function prorate(total, weights) {
      const s = weights.reduce((a,b)=>a+(b||0), 0);
      if (!s || !total) return weights.map(()=>0);
      return weights.map(w => Math.round(total * (w||0) / s));
    }
    const wAct  = [...R26A_w.slice(0, ytdM), ...Array(12-ytdM).fill(0)];
    const wProj = [...Array(ytdM).fill(0),   ...R26P_w.slice(ytdM, 12)];
    const est_act  = prorate(m.actual_26, wAct);
    const est_proj = prorate(m.proj_26,   wProj);
    m26_display = est_act.map((a,i) => a + est_proj[i]);
    m25_display = prorate(m.actual_25, R25_w);
    isEstimated = true;
  }
  const m26_act  = m26_display.map((v,i) => i < ytdM ? v : 0);
  const m26_proj = m26_display.map((v,i) => i >= ytdM ? v : 0);

    ]},

      scales:scalesXY(false) }
  });
  document.getElementById('modal-table').innerHTML = `
    <thead><tr>

      <th>2025</th><th>2026 Act.</th><th>2026 Proj.</th><th>VS LY</th>
    </tr></thead>
    <tbody>${MONTHS.map((mo,i)=>{
      const a25  = m25_display[i]||0;
      const a26  = m26_act[i]||0;
      const p26  = m26_proj[i]||0;
      const vs   = a25>0 ? pct(a26+p26,a25) : null;
      const isAct = i < ytdM;
      return `<tr>
        <td style="text-align:left;color:var(--text2)">${mo}</td>
        <td class="past">${a25>0?fmt(a25):'‚Äì'}</td>
        <td class="${isAct?'act26':'neu'}">${a26>0?fmt(a26):'‚Äì'}</td>
        <td class="${!isAct?'proj26':'neu'}">${p26>0?fmt(p26):'‚Äì'}</td>
        <td>${vs!=null?(vs>=0?`<span class="yoy-pos">+${vs}%</span>`:`<span class="yoy-neg">${vs}%</span>`):'‚Äì'}</td>
      </tr>`;
    }).join('')}

      <td class="past">${m.actual_25>0?fmt(m.actual_25):'‚Äì'}</td>
      <td class="act26">${fmt(m.actual_26)}</td>
      <td class="proj26">${fmt(m.proj_26)}</td>
      <td>${m.actual_25>0?pctStr(s26,m.actual_25):'‚Äì'}</td>
    </tr></tbody>`;
  document.getElementById('modal-note').innerHTML = isEstimated
    ? `<span style="opacity:.5;font-size:10px">~ Monthly figures estimated from portfolio seasonality</span>`
    : '';
  document.getElementById('modal-overlay').classList.add('open');
}
